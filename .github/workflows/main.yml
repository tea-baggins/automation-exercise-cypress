name: End-to-end tests
on: [push, pull_request]

# Permissions required to publish the report to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest # Standardized CI environment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cypress execution
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        # Continue even if tests fail to ensure the reporting step is executed
        continue-on-error: true 

      - name: Generate Unified HTML Report
        run: |
          # Merge individual JSON results into a single file
          npx mochawesome-merge cypress/results/*.json > mochawesome.json
          # Generate a standalone HTML report with inline assets for portability
          npx marge mochawesome.json --reportDir public --inline

      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always() # Ensure the report is updated regardless of test outcome
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public